# Base directory where live slurm controller folders exist.
# Example: /etc -> /etc/slurm1, /etc/slurm2, ...
SLURM_BASE_DIR="/etc"

# Controller naming and range.
CONTROLLER_PREFIX="slurm"
MAX_CONTROLLERS=4

# Input file defaults.
DEFAULT_INPUT_FILE="input_data"

# Runtime directories. Relative paths are resolved from script directory.
BACKUP_BASE_DIR="backups"
LOG_DIR="logs"

# Restart and post-restart behavior.
RESTART_STABILIZE_SECONDS=5
ENABLE_ANSIBLE_SYNC=false
ANSIBLE_TARGET_BASE="/bfs/hpc/GENESIS/ansible/slurm/files"

# When true, skip interactive confirmation before apply.
AUTO_APPROVE=false
